{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<h2>Log in</h2>

<form action="/login" method="post">
  <p>
    Username: <br />
    <input type="text" name="username" maxlength="25" required/>
  </p>
  <p>
    Password: <br />
    <input type="password" name="password" required/>
  </p>
  <input type="submit" value="Log in" />
</form>
{% endblock %}
