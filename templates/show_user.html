<!DOCTYPE html>
<html>

<head>
  <title>User {{user.username}}</title>
</head>

<body>
  <h1>User {{user.username}}</h1>
  <p>
    Total hosting events are {{events | count}}.
  </p>
  <h2>Events</h2>
  <ul>
    {% for event in events %}
    <li><a href="/event/{{event.id}}">{{event.event_name}}</a></li>
    {% endfor %}
  </ul>
  <p>
    <a href="/">Back to events</a>
  </p>
</body>

</html>
