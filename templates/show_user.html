{% extends "layout.html" %}

{% block title %}User {{user.username}}{% endblock %}

{% block content %}
<h2>User {{user.username}}</h2>
<p>
  Total hosting events: {{events | count}}
</p>
<h3>Events</h3>
<ul>
  {% for event in events %}
  <li><a href="/event/{{event.id}}">{{event.event_name}}</a></li>
  {% endfor %}
</ul>
<p>
  <a href="/">Back to events</a>
</p>
{% endblock %}
